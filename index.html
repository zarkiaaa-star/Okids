<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8f9fa; }
        .wave-bg {
            background-color: #ef4444;
            border-radius: 50% 50% 0 0 / 20% 20% 0 0;
        }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen p-4">

    <div class="max-w-sm w-full bg-white shadow-xl rounded-xl overflow-hidden border border-gray-100">
        
        <div class="flex justify-center p-4">
            <img src="https://via.placeholder.com/150x50?text=Groupe+Goumidi" alt="Logo" class="h-12 object-contain">
        </div>

        <div class="px-6 pb-4">
            <button class="w-full bg-[#ef4444] text-white py-3 rounded-lg flex justify-center items-center gap-2 text-lg font-bold shadow-md active:scale-95 transition-transform">
                <span>قائمة طعام</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
        </div>

        <div class="relative bg-white pt-4 px-10">
            <img src="https://via.placeholder.com/300x400?text=Okids+Product" alt="Okids Milk" class="w-full h-auto object-contain">
        </div>

        <div class="wave-bg bg-[#ef4444] text-white text-center py-8 px-6 -mt-10 relative z-10">
            <h2 class="text-2xl font-bold mb-2">حليب الأطفال المجفف</h2>
            <p class="text-sm opacity-90 leading-relaxed">
                ماء معالج، مسحوق حليب الشيدر، ملح الطعام.
            </p>
        </div>

        <div class="py-10 flex justify-center bg-[#fefefe]">
            <div class="border-2 border-red-500 p-1 rounded-lg">
                <button class="bg-[#ef4444] text-white px-10 py-2 rounded-md font-bold hover:bg-red-600 transition-colors">
                    يكتشف
                </button>
            </div>
        </div>

    </div>

</body>
</html>
